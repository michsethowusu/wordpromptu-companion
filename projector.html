<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data: blob:; img-src * data: blob:;">
  <title>Projector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
    }

    #verse-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5vw;
      text-align: center;
      transition: opacity 0.3s;
    }

    #verse-content {
      max-width: 100%;
      line-height: 1.4;
    }

    #image-layer {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #image-layer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #blank-overlay {
      position: absolute;
      inset: 0;
      background: #000;
      display: none;
    }
  </style>
</head>
<body>

  <div id="verse-layer">
    <div id="verse-content"></div>
  </div>

  <div id="image-layer">
    <img id="proj-image" src="" alt="">
  </div>

  <div id="blank-overlay"></div>

  <script>
    const verseLayer  = document.getElementById('verse-layer')
    const verseContent = document.getElementById('verse-content')
    const imageLayer  = document.getElementById('image-layer')
    const projImage   = document.getElementById('proj-image')
    const blankOverlay = document.getElementById('blank-overlay')

    function showVerse() {
      imageLayer.style.display  = 'none'
      blankOverlay.style.display = 'none'
      verseLayer.style.opacity  = '1'
    }

    function showBlank() {
      blankOverlay.style.display = 'block'
    }

    window.companion.onUpdateVerse(({ content }) => {
      verseContent.innerHTML = content || ''
      showVerse()
    })

    window.companion.onClearProjector(() => {
      verseContent.innerHTML = ''
      showBlank()
    })

    window.companion.onStyleUpdate((style) => {
      if (!style) return
      if (style.bgColor)    document.body.style.background     = style.bgColor
      if (style.fontColor)  verseContent.style.color           = style.fontColor
      if (style.fontFamily) verseContent.style.fontFamily      = style.fontFamily
      if (style.fontSize)   verseContent.style.fontSize        = style.fontSize
    })

    window.companion.onImageDisplay(({ url }) => {
      projImage.src = url
      verseLayer.style.opacity = '0'
      imageLayer.style.display = 'flex'
    })

    window.companion.onClearMedia(() => {
      showVerse()
    })

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        // Fullscreen toggle is handled by Electron automatically in fullscreen mode
      }
      if (e.key === 'Escape') window.close()
    })
  </script>
</body>
</html>
